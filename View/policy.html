<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quy định</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300..800;1,300..800&display=swap");

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #dcedd0;
      }

      .back-home {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(135deg, #2f7d1e 0%, #183c05 100%);
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 8px 16px rgba(24, 60, 5, 0.32);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .back-home:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(24, 60, 5, 0.38);
      }

      .back-home svg {
        width: 24px;
        height: 24px;
      }

      .policy-image {
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
        object-fit: contain;
        object-position: center;
        display: block;
      }

      /* Chinh rieng cho trang policy: ha logo map xuong them */
      body .global-bottom-nav .menuItemContent {
        font-size: 17px;
        font-weight: 600;
      }

      body .global-bottom-nav .menuItemLink {
        gap: 0;
      }

      body .global-bottom-nav .menuItemIcon {
        margin-bottom: 0;
        transform: translateY(12px);
      }

      body .global-bottom-nav .menuMap {
        transform: translateY(-8px);
      }

      body .global-bottom-nav .menuMapIcon {
        transform: translateY(3px);
      }

      @media (max-width: 480px) {
        body .global-bottom-nav .menuItemContent {
          font-size: 15px;
        }

        body .global-bottom-nav .menuItemLink {
          gap: 0;
        }
      }
    </style>
  </head>
  <body>
    <a class="back-home" href="/" title="Quay lại trang chủ" aria-label="Quay lại trang chủ">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <img src="assets1/quydinh6.png" alt="Quy định" class="policy-image" />
    <script src="shared-nav.js"></script>
  </body>
</html>
