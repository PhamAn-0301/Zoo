          if (type === "toilet") {

          }
          if (type === "zoo") {
            return { status: "Vườn thú", color: "#4CAF50", icon: "🦁" };
          }
          if (type === "shop") {
            return { status: "Mua sắm", color: "#9C27B0", icon: "🛍️" };

            return { status: "Y tế", color: "#F44336", icon: "🚑" };
          }
          if (type === "restaurant") {
            return { status: "Nhà hàng", color: "#FF9800", icon: "🍽️" };
          }
          if (waitTime === null) {
            return { status: "Bảo trì", color: "#999", icon: "🔧" };
          } else if (waitTime < 10) {
            return { status: "Thông thoáng", color: "#4CAF50", icon: "✓" };
          } else if (waitTime < 20) {
            return { status: "Bình thường", color: "#FFC107", icon: "○" };
          } else if (waitTime < 40) {
            return { status: "Đông", color: "#FF9800", icon: "◐" };
          } else {
            return { status: "Rất đông", color: "#F44336", icon: "●" };
          }
        }

        // Calculate distance between two points
        function calculateDistance(x1, y1, x2, y2) {
          return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        }

        // Get suggestions for an attraction
        function getSuggestions(currentAttraction, allAttractions) {
          const rides = [];
          const utilities = [];

          allAttractions.forEach((attraction) => {
            // Skip current attraction and maintenance attractions
            if (
              attraction.name === currentAttraction.name ||
              attraction.maintainance
            ) {
              return;
            }

            const distance = calculateDistance(
              currentAttraction.x,
              currentAttraction.y,
              attraction.x,
              attraction.y,
            );

            // Categorize by type
            if (attraction.type === "ride" || attraction.type === "zoo") {
              // For rides/zoo: score based on distance and wait time
              const waitTime = attraction.wait_time || 0;
              // Normalize scores (lower is better for both)
              // Distance weight: 50%, Wait time weight: 50%
              const distanceScore = distance;
              const waitTimeScore = waitTime * 50; // Scale wait time to similar range as distance
              const totalScore = distanceScore + waitTimeScore;

              rides.push({
                ...attraction,
                distance: distance,
                score: totalScore,
              });
            } else if (
              ["restaurant", "toilet", "shop", "medical"].includes(
                attraction.type,
              )
            ) {
              // For utilities: score only based on distance
              utilities.push({
                ...attraction,
                distance: distance,
                score: distance,
              });
            }
          });

          // Sort by score (lower is better) and get top 3
          rides.sort((a, b) => a.score - b.score);
          utilities.sort((a, b) => a.score - b.score);

          return {
            rides: rides.slice(0, 3),
            utilities: utilities.slice(0, 3),
          };

          if (attraction.weight) {

                <div style="font-size: 10px; color: #999; margin-bottom: 2px;">Cân nặng</div>
                <div style="font-size: 11px; color: #f77119; font-weight: bold;">${attraction.weight}</div>
              </div>
            `;
          }

          // Restaurant type
          if (attraction.restaurant_type) {
            popupContent += `
              <div style="background: white; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #ffe2c5;">
                <div style="font-size: 16px; margin-bottom: 4px;">🍽️</div>
                <div style="font-size: 10px; color: #999; margin-bottom: 2px;">Loại hình</div>
                <div style="font-size: 11px; color: #f77119; font-weight: bold;">${attraction.restaurant_type}</div>
              </div>
            `;
          }

          // Cuisine
          if (attraction.cuisine) {
            popupContent += `
              <div style="background: white; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #ffe2c5;">
                <div style="font-size: 16px; margin-bottom: 4px;">🌍</div>
                <div style="font-size: 10px; color: #999; margin-bottom: 2px;">Ẩm thực</div>
                <div style="font-size: 11px; color: #f77119; font-weight: bold;">${attraction.cuisine}</div>
              </div>
            `;
          }

          popupContent += `</div>`; // Close grid

          // Weather warning
          if (attraction.weather_stop) {
            popupContent += `
              <div style="background: #fff3cd; border: 1px solid #ffecb5; border-radius: 6px; padding: 8px; margin-top: 8px; display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 16px;">⛈️</span>
                <span style="font-size: 11px; color: #856404;">Có thể tạm dừng khi thời tiết xấu</span>
              </div>
            `;
          }

          // Maintenance warning
          if (attraction.maintainance) {
            popupContent += `
              <div style="background: #f8d7da; border: 1px solid #f5c2c7; border-radius: 6px; padding: 8px; margin-top: 8px; display: flex; align-items: center; gap: 8px;">

          if (attraction.type === "ride" && !attraction.maintainance) {

                 <i class="fa-solid fa-lightbulb" style="color: #f77119; font-size: 16px;"></i>

          }
          // Add suggestions
          const suggestions = getSuggestions(attraction, attractions);
          popupContent += createSuggestionsHTML(suggestions, attraction.name);

          popupContent += `</div>`; // Close content
          popupContent += `</div>`; // Close scroll container
          popupContent += `</div>`; // Close main wrapper

          marker.bindPopup(popupContent, {
            maxWidth: 340,
            className: "custom-popup",
            autoPan: true,
            autoPanPaddingTopLeft: [20, 80],
            autoPanPaddingBottomRight: [20, 20],
            autoPanPadding: [70, 70],
            keepInView: true,
            closeButton: true,
            autoClose: true,
            closeOnClick: false,
          });

          // Smooth pan to marker when popup opens
          marker.on("click", function (e) {
            setTimeout(() => {
              // Calculate smart offset based on marker position
              const mapSize = map.getSize();
              const markerPoint = map.latLngToContainerPoint(e.latlng);

              // If marker is in bottom half of screen, pan it down to make room for popup
              let offsetY = 0;
              if (markerPoint.y > mapSize.y * 0.5) {
                // Bottom half - offset downward (positive Y)
                const distanceFromBottom = mapSize.y - markerPoint.y;
                // Calculate offset: more offset if closer to bottom
                offsetY = Math.min(
                  200,
                  Math.max(100, 250 - distanceFromBottom),
                );
              } else {
                // Top half - small upward offset
                offsetY = -50;
              }

              // Apply offset
              const targetPoint = markerPoint.add([0, offsetY]);
              const adjustedLatLng = map.containerPointToLatLng(targetPoint);

              map.panTo(adjustedLatLng, {
                animate: true,
                duration: 0.5,
                easeLinearity: 0.25,
              });
            }, 100);
          });

          // Add click handlers for suggestion cards after popup opens
          marker.on("popupopen", function () {
            const popup = marker.getPopup();
            const popupElement = popup.getElement();

            const suggestionCards =
              popupElement.querySelectorAll(".suggestion-card");
            suggestionCards.forEach((card) => {
              card.addEventListener("click", function () {
                const attractionName = this.getAttribute(
                  "data-attraction-name",
                );
                const attractionX = parseInt(
                  this.getAttribute("data-attraction-x"),
                );
                const attractionY = parseInt(
                  this.getAttribute("data-attraction-y"),
                );

                // Find the marker for this attraction (match name and coordinates)
                const targetMarker = allMarkers.find(
                  (m) =>
                    m.data.name === attractionName &&
                    m.data.x === attractionX &&
                    m.data.y === attractionY,
                );
                if (targetMarker) {
                  // Close current popup
                  map.closePopup();

                  // Pan and zoom to the target marker
                  map.setView(
                    [targetMarker.data.y, targetMarker.data.x],
                    map.getZoom(),
                    {
                      animate: true,
                      duration: 0.8,
                      easeLinearity: 0.25,
                    },
                  );

                  // Open the target marker's popup after animation
                  setTimeout(() => {
                    targetMarker.marker.openPopup();
                  }, 500);
                }
              });
            });

            // Add click handlers for booking buttons
            const bookingButtons =
              popupElement.querySelectorAll(".popup-book-btn");
            bookingButtons.forEach((btn) => {
              // Add hover effects
              btn.addEventListener("mouseenter", function () {
                if (!this.disabled) {
                  this.style.transform = "translateY(-2px)";
                  if (this.classList.contains("popup-book-virtual")) {
                    this.style.boxShadow = "0 4px 12px rgba(52, 152, 219, 0.5)";
                  } else {
                    this.style.boxShadow = "0 4px 12px rgba(247, 113, 25, 0.5)";
                  }
                }
              });

              btn.addEventListener("mouseleave", function () {
                if (!this.disabled) {
                  this.style.transform = "translateY(0)";
                  if (this.classList.contains("popup-book-virtual")) {
                    this.style.boxShadow = "0 2px 8px rgba(52, 152, 219, 0.3)";
                  } else {
                    this.style.boxShadow = "0 2px 8px rgba(247, 113, 25, 0.3)";
                  }
                }
              });

              // Add click handler
              btn.addEventListener("click", function () {
                if (this.disabled) return;

                const attractionId = parseInt(
                  this.getAttribute("data-attraction-id"),
                );
                const bookingType = this.classList.contains(
                  "popup-book-virtual",
                )
                  ? "virtual"
                  : "priority";

                // Navigate to game.html with parameters
                const params = new URLSearchParams({
                  attractionId: attractionId,
                  bookingType: bookingType,
                });

                window.location.href = `/game?${params.toString()}`;
              });
            });
          });

          // Store marker with attraction data for filtering
          allMarkers.push({
            marker: marker,
            data: attraction,
          });
        });
        // attractions.forEach((attraction) => {

        //               <span style="color: ${crowdInfo.color}; font-weight: bold;">${crowdInfo.icon} ${crowdInfo.status}</span>
        //             </p>
        //           </div>
        //         `;
        //
        //   marker.bindPopup(popupContent);
        // });

        // Search functionality
        const searchBox = document.getElementById("searchBox");
        searchBox.addEventListener("input", function (e) {
          const searchTerm = e.target.value.toLowerCase().trim();
          filterMarkers(searchTerm, currentFilter);
        });

        // Filter functionality
        let currentFilter = "all";
        const filterButtons = document.querySelectorAll(".filter-btn");

        filterButtons.forEach((btn) => {
          btn.addEventListener("click", function () {
            // Update active button
            filterButtons.forEach((b) => b.classList.remove("active"));
            this.classList.add("active");

            // Get filter type
            currentFilter = this.getAttribute("data-filter");
            const searchTerm = searchBox.value.toLowerCase().trim();
            filterMarkers(searchTerm, currentFilter);
          });
        });

        // Filter markers based on search and filter type
        function filterMarkers(searchTerm, filterType) {
          allMarkers.forEach(({ marker, data }) => {
            let showMarker = true;

            // Filter by type
            if (filterType !== "all" && data.type !== filterType) {
              showMarker = false;
            }

            // Filter by search term
            if (searchTerm && !data.name.toLowerCase().includes(searchTerm)) {
              if (
                !data.location ||
                !data.location.toLowerCase().includes(searchTerm)
              ) {
                if (
                  !data.description ||
                  !data.description.toLowerCase().includes(searchTerm)
                ) {
                  showMarker = false;
                }
              }
            }

            // Show or hide marker
            if (showMarker) {
              if (!map.hasLayer(marker)) {
                marker.addTo(map);
              }
            } else {
              if (map.hasLayer(marker)) {
                map.removeLayer(marker);
              }
            }
          });
        }

        // Legend toggle functionality
        const searchToggle = document.getElementById("searchToggle");
        const searchPanel = document.getElementById("searchPanel");

        // Show toggle button when panel is hidden, hide when panel is shown
        function updateSearchToggle() {
          if (searchPanel.classList.contains("hide")) {
            searchToggle.style.display = "block";
          } else {
            searchToggle.style.display = "none";
          }
        }

        // Toggle panel on button click
        searchToggle.addEventListener("click", function () {
          searchPanel.classList.remove("hide");
          updateSearchToggle();
        });

        // Hide panel and show toggle button when clicking outside panel
        document.addEventListener("click", function (e) {
          if (
            !searchPanel.contains(e.target) &&
            !searchToggle.contains(e.target) &&
            !e.target.classList.contains("search-box") // allow typing in search
          ) {
            searchPanel.classList.add("hide");
            updateSearchToggle();
          }
        });

        const legendToggle = document.getElementById("legendToggle");
        const legendPanel = document.getElementById("legendPanel");

        legendToggle.addEventListener("click", function () {
          legendPanel.classList.toggle("show");
        });

        // Close legend when clicking outside
        document.addEventListener("click", function (e) {
          if (
            !legendPanel.contains(e.target) &&
            !legendToggle.contains(e.target)
          ) {
            legendPanel.classList.remove("show");
          }
        });
      };
