<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- ========== CHATBOT BÉ VIN ========== -->
    <link rel="stylesheet" href="chatbot/chatbot.html">
  </head>
  <body>
    <!-- Chatbot Container -->
    <div id="vinwonders-chatbot">
      <!-- Nút mở chatbot - THEO ẢNH -->
      <button id="chatbot-toggle" class="chatbot-toggle" aria-label="Mở chatbot">
        
        <img src="../assets1/icon1.jpg" alt="Bé Vin" class="chatbot-avatar">
      </button>

      <!-- Cửa sổ chat -->
      <div id="chatbot-window" class="chatbot-window">
        <!-- Header -->
        <div class="chatbot-header">
          <div class="chatbot-header-info">
        
            <img src="../assets1/icon1.jpg" alt="Bé Vin" class="chatbot-header-avatar">
            <div class="chatbot-header-text">
              <h3><h3>Kiểm lâm viên AI</h3></h3>
              <span class="chatbot-status">● Đang hoạt động</span>
            </div>
          </div>
          <button id="chatbot-close" class="chatbot-close" aria-label="Đóng chatbot">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M15 5L5 15M5 5L15 15" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <!-- Messages -->
        <div id="chatbot-messages" class="chatbot-messages">
          <!-- Welcome message -->
          <div class="message bot-message">
            
            <img src="../assets1/icon1.jpg" alt="Bé Vin" class="message-avatar">
            <div class="message-bubble">
              <p>Xin chào 👋! Tôi là trợ lý AI của Thảo Cầm Viên Sài Gòn.</p>
              <p>Bạn có thể hỏi về giờ mở cửa, giá vé, các loài động vật hoặc đường đi tham quan.</p>
            </div>
          </div>
        </div>

        <!-- Input -->
        <div class="chatbot-input-container">
          <input 
            type="text" 
            id="chatbot-input" 
            class="chatbot-input" 
            placeholder="Giờ mở cửa là mấy giờ?"
            autocomplete="off"
          >
          <button id="chatbot-send" class="chatbot-send-btn" aria-label="Gửi tin nhắn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M18 2L9 11M18 2L12 18L9 11M18 2L2 8L9 11" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      
        
        <div id="chatbot-typing" class="chatbot-typing" style="display: none;">
          <!--
          <img src="../assets1/icon1.jpg" alt="Bé Vin" class="message-avatar">
          -->
          <div class="typing-bubble">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </body>
